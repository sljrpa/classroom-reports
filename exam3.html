<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>📝 月考分析 · 高三一班&三班</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
  min-height: 100vh;
  color: #2c3e50;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.top-bar { height: 4px; background: linear-gradient(90deg, #3498db, #e67e22, #9b59b6, #2ecc71); }
.container { max-width: 800px; margin: 0 auto; padding: 24px 16px 40px; }
.hero { text-align: center; padding: 36px 20px 28px; margin-bottom: 24px; }
.hero-icon { font-size: 52px; margin-bottom: 14px; display: block; }
.hero h1 { font-size: 26px; font-weight: 700; color: #2c3e50; margin-bottom: 6px; }
.hero .subtitle { font-size: 15px; color: #7f8c8d; font-weight: 400; }
.hero .divider { width: 48px; height: 3px; background: linear-gradient(90deg, #3498db, #e67e22); border-radius: 2px; margin: 14px auto 0; }
.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: #7f8c8d; text-decoration: none; margin-bottom: 20px; padding: 6px 0; transition: color 0.2s; }
.back-link:hover { color: #2c3e50; }
.class-cards { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 24px; }
.class-card {
  background: white; border-radius: 16px; padding: 28px 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06); text-decoration: none; color: inherit;
  display: block; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer;
  position: relative; overflow: hidden;
}
.class-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
.class-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
.class-card.c1::before { background: linear-gradient(90deg, #3498db, #2ecc71); }
.class-card.c3::before { background: linear-gradient(90deg, #e67e22, #9b59b6); }
.card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.card-icon { font-size: 40px; flex-shrink: 0; }
.card-title { font-size: 22px; font-weight: 700; color: #2c3e50; }
.card-subtitle { font-size: 13px; color: #95a5a6; margin-top: 2px; }
.card-desc { font-size: 14px; color: #7f8c8d; line-height: 1.7; }
.card-stats { display: flex; gap: 16px; margin-top: 16px; padding-top: 16px; border-top: 1px solid #f0f0f0; }
.stat { text-align: center; flex: 1; }
.stat-num { font-size: 22px; font-weight: 700; }
.c1 .stat-num { color: #3498db; }
.c3 .stat-num { color: #e67e22; }
.stat-label { font-size: 12px; color: #bdc3c7; margin-top: 2px; }
.arrow { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 20px; color: #ccc; transition: transform 0.2s, color 0.2s; }
.class-card:hover .arrow { transform: translateY(-50%) translateX(3px); color: #999; }
.footer { text-align: center; padding: 24px 16px; color: #bdc3c7; font-size: 13px; line-height: 1.8; }
.footer .line { width: 32px; height: 2px; background: #ddd; border-radius: 1px; margin: 0 auto 12px; }
@media (min-width: 600px) { .class-cards { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="container">
  <a class="back-link" href="../index.html">‹ 返回首页</a>
  <div class="hero">
    <span class="hero-icon">📝</span>
    <h1>月考分析报告</h1>
    <p class="subtitle">2026年6月高三月考 · 逐题估分分析</p>
    <div class="divider"></div>
  </div>
  <div class="class-cards">
    <a class="class-card c1" href="exam3/class1.html">
      <div class="card-header">
        <span class="card-icon">📘</span>
        <div>
          <div class="card-title">高三一班</div>
          <div class="card-subtitle">52人 · 月考分析</div>
        </div>
      </div>
      <div class="card-desc">班级总报告 + 每人逐题估分分析</div>
      <div class="card-stats">
        <div class="stat"><div class="stat-num">52</div><div class="stat-label">学生</div></div>
        <div class="stat"><div class="stat-num">150</div><div class="stat-label">满分</div></div>
      </div>
      <span class="arrow">›</span>
    </a>
    <a class="class-card c3" href="exam3/class3.html">
      <div class="card-header">
        <span class="card-icon">📙</span>
        <div>
          <div class="card-title">高三三班</div>
          <div class="card-subtitle">49人 · 月考分析</div>
        </div>
      </div>
      <div class="card-desc">班级总报告 + 每人逐题估分分析</div>
      <div class="card-stats">
        <div class="stat"><div class="stat-num">49</div><div class="stat-label">学生</div></div>
        <div class="stat"><div class="stat-num">150</div><div class="stat-label">满分</div></div>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>
  <div class="footer">
    <div class="line"></div>
    <p>本站为只读展示页面，数据仅供家长参考</p>
    <p>如有疑问请与班主任联系</p>
  </div>
</div>
</body>
</html>
