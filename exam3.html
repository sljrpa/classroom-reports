<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>📝 高三三班 · 月考分析</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
  min-height: 100vh;
  color: #2c3e50;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.top-bar {
  height: 4px;
  background: linear-gradient(90deg, #e74c3c, #e67e22, #f1c40f, #2ecc71, #3498db, #9b59b6);
}
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 24px 16px 40px;
}
.hero {
  text-align: center;
  padding: 36px 20px 28px;
  margin-bottom: 24px;
}
.hero-icon { font-size: 52px; margin-bottom: 14px; display: block; }
.hero h1 { font-size: 26px; font-weight: 700; color: #2c3e50; margin-bottom: 6px; }
.hero .subtitle { font-size: 15px; color: #7f8c8d; font-weight: 400; }
.hero .divider { width: 48px; height: 3px; background: linear-gradient(90deg, #e67e22, #9b59b6); border-radius: 2px; margin: 14px auto 0; }

.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 14px; color: #7f8c8d; text-decoration: none;
  margin-bottom: 20px; padding: 6px 0;
  transition: color 0.2s;
}
.back-link:hover { color: #2c3e50; }

.info-bar {
  background: white; border-radius: 12px; padding: 16px 20px;
  margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  display: flex; flex-wrap: wrap; gap: 16px; justify-content: center;
}
.info-item { text-align: center; }
.info-num { font-size: 22px; font-weight: 700; color: #e67e22; }
.info-label { font-size: 12px; color: #bdc3c7; margin-top: 2px; }

.student-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.student-card {
  background: white; border-radius: 12px; padding: 16px 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  text-decoration: none; color: inherit; display: flex;
  align-items: center; justify-content: space-between;
  transition: transform 0.2s, box-shadow 0.2s; cursor: pointer;
}
.student-card:hover {
  transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.1);
}
.student-card:active {
  transform: translateY(0); box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}

.student-left { display: flex; align-items: center; gap: 14px; }
.student-rank {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: white; flex-shrink: 0;
}
.student-rank.top3 { background: linear-gradient(135deg, #f1c40f, #e67e22); }
.student-rank.top10 { background: linear-gradient(135deg, #3498db, #2980b9); }
.student-rank.other { background: #bdc3c7; }

.student-name { font-size: 16px; font-weight: 600; color: #2c3e50; }

.student-right { display: flex; align-items: center; gap: 12px; }
.student-score { font-size: 20px; font-weight: 700; }
.student-score.high { color: #27ae60; }
.student-score.mid { color: #e67e22; }
.student-score.low { color: #e74c3c; }
.student-arrow { font-size: 18px; color: #ccc; transition: transform 0.2s, color 0.2s; }
.student-card:hover .student-arrow { transform: translateX(3px); color: #999; }

.score-bar-wrap { width: 80px; height: 6px; background: #ecf0f1; border-radius: 3px; overflow: hidden; }
.score-bar { height: 100%; border-radius: 3px; }
.score-bar.high { background: linear-gradient(90deg, #2ecc71, #27ae60); }
.score-bar.mid { background: linear-gradient(90deg, #f39c12, #e67e22); }
.score-bar.low { background: linear-gradient(90deg, #e74c3c, #c0392b); }

.footer {
  text-align: center; padding: 24px 16px;
  color: #bdc3c7; font-size: 13px; line-height: 1.8;
}
.footer .line { width: 32px; height: 2px; background: #ddd; border-radius: 1px; margin: 0 auto 12px; }

@media (min-width: 480px) {
  .student-grid { grid-template-columns: 1fr 1fr; }
}
@media (min-width: 700px) {
  .student-grid { grid-template-columns: 1fr 1fr 1fr; }
  .hero h1 { font-size: 30px; }
}
</style>
</head>
<body>

<div class="top-bar"></div>

<div class="container">
  <a class="back-link" href="index.html">‹ 返回首页</a>

  <div class="hero">
    <span class="hero-icon">📝</span>
    <h1>高三三班 · 月考分析</h1>
    <p class="subtitle">2026年6月第一次月考 · 逐题估分分析</p>
    <div class="divider"></div>
  </div>

  <div class="info-bar">
    <div class="info-item">
      <div class="info-num">25</div>
      <div class="info-label">参评学生</div>
    </div>
    <div class="info-item">
      <div class="info-num">150</div>
      <div class="info-label">满分</div>
    </div>
    <div class="info-item">
      <div class="info-num">26</div>
      <div class="info-label">评分点</div>
    </div>
  </div>

  <a class="student-card" href="exam3/班级总报告.html" style="background:linear-gradient(135deg,#fff5eb,#ffe0cc);border:2px solid #e67e22">
      <div class="student-left">
        <div class="student-rank top3" style="background:linear-gradient(135deg,#e67e22,#d35400)">📊</div>
        <div class="student-name" style="color:#e67e22">班级总报告</div>
      </div>
      <div class="student-right">
        <span style="font-size:13px;color:#7f8c8d">全班数据分析 · 薄弱知识点 · 教学建议</span>
        <span class="student-arrow">›</span>
      </div>
    </a>
    <div class="student-grid" id="studentGrid"></div>

  <div class="footer">
    <div class="line"></div>
    <p>本站为只读展示页面，数据仅供家长参考</p>
    <p>如有疑问请与班主任联系</p>
  </div>
</div>

<script>
const students = [
  { name: "巩子华", file: "巩子华_月考分析报告.html", score: 106 },
  { name: "吴浩铭", file: "吴浩铭_月考分析报告.html", score: 106 },
  { name: "马铄", file: "马铄_月考分析报告.html", score: 115 },
  { name: "郑智遥", file: "郑智遥_月考分析报告.html", score: 109 },
  { name: "单子玉", file: "单子玉_月考分析报告.html", score: 103 },
  { name: "韦天宇", file: "韦天宇_月考分析报告.html", score: 100 },
  { name: "裴梦琳", file: "裴梦琳_月考分析报告.html", score: 101 },
  { name: "贾翔云", file: "贾翔云_月考分析报告.html", score: 97 },
  { name: "颜煜昊", file: "颜煜昊_月考分析报告.html", score: 89 },
  { name: "赵子恒", file: "赵子恒_月考分析报告.html", score: 89 },
  { name: "王潇", file: "王潇_月考分析报告.html", score: 89 },
  { name: "杨子涵", file: "杨子涵_月考分析报告.html", score: 92 },
  { name: "高洪宇", file: "高洪宇_月考分析报告.html", score: 92 },
  { name: "李果轩", file: "李果轩_月考分析报告.html", score: 90 },
  { name: "蒋予涵", file: "蒋予涵_月考分析报告.html", score: 80 },
  { name: "姬瑾萱", file: "姬瑾萱_月考分析报告.html", score: 80 },
  { name: "冯洪冉", file: "冯洪冉_月考分析报告.html", score: 77 },
  { name: "王祖雄", file: "王祖雄_月考分析报告.html", score: 77 },
  { name: "张伊璇", file: "张伊璇_月考分析报告.html", score: 76 },
  { name: "张瀞文", file: "张瀞文_月考分析报告.html", score: 68 },
  { name: "段云思源", file: "段云思源_月考分析报告.html", score: 68 },
  { name: "孙悦瑄", file: "孙悦瑄_月考分析报告.html", score: 68 },
  { name: "任思羽", file: "任思羽_月考分析报告.html", score: 74 },
  { name: "王喻婕", file: "王喻婕_月考分析报告.html", score: 73 },
  { name: "俞成辉", file: "俞成辉_月考分析报告.html", score: 57 }
];

students.sort((a, b) => b.score - a.score);

const grid = document.getElementById('studentGrid');
const maxScore = 150;

students.forEach((s, i) => {
  const rank = i + 1;
  const pct = (s.score / maxScore * 100).toFixed(0);
  const cls = s.score >= 100 ? 'high' : s.score >= 75 ? 'mid' : 'low';
  const rankCls = rank <= 3 ? 'top3' : rank <= 10 ? 'top10' : 'other';

  const card = document.createElement('a');
  card.className = 'student-card';
  card.href = 'exam3/' + encodeURIComponent(s.file);
  card.innerHTML = `
    <div class="student-left">
      <div class="student-rank ${rankCls}">${rank}</div>
      <div class="student-name">${s.name}</div>
    </div>
    <div class="student-right">
      <div class="score-bar-wrap"><div class="score-bar ${cls}" style="width:${pct}%"></div></div>
      <div class="student-score ${cls}">${s.score}</div>
      <span class="student-arrow">›</span>
    </div>
  `;
  grid.appendChild(card);
});
</script>

</body>
</html>
