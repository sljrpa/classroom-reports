<html lang="zh-CN">

<meta charset="UTF-8">

<title>高三三班 · 月考分析</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
  min-height: 100vh; color: #2c3e50; line-height: 1.6; -webkit-font-smoothing: antialiased;
}
.top-bar { height: 4px; background: linear-gradient(90deg, #e67e22, #2ecc71); }
.container { max-width: 800px; margin: 0 auto; padding: 24px 16px 40px; }
.hero { text-align: center; padding: 30px 20px 24px; margin-bottom: 20px; }
.hero-icon { font-size: 48px; margin-bottom: 12px; display: block; }
.hero h1 { font-size: 24px; font-weight: 700; color: #2c3e50; margin-bottom: 4px; }
.hero .subtitle { font-size: 14px; color: #7f8c8d; }
.hero .divider { width: 48px; height: 3px; background: #e67e22; border-radius: 2px; margin: 12px auto 0; }
.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: #7f8c8d; text-decoration: none; margin-bottom: 16px; transition: color 0.2s; }
.back-link:hover { color: #2c3e50; }
.info-bar {
  background: white; border-radius: 12px; padding: 14px 20px; margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-wrap: wrap; gap: 16px; justify-content: center;
}
.info-item { text-align: center; }
.info-num { font-size: 20px; font-weight: 700; color: #e67e22; }
.info-label { font-size: 12px; color: #bdc3c7; margin-top: 2px; }
.report-banner {
  background: #fef5e7; border: 2px solid #e67e22; border-radius: 12px; padding: 16px 20px;
  margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between;
  text-decoration: none; color: inherit; cursor: pointer; transition: transform 0.2s;
}
.report-banner:hover { transform: translateY(-2px); }
.report-banner .left { display: flex; align-items: center; gap: 12px; }
.report-banner .icon { font-size: 28px; }
.report-banner .title { font-size: 16px; font-weight: 700; color: #e67e22; }
.report-banner .desc { font-size: 12px; color: #7f8c8d; margin-top: 2px; }
.report-banner .arrow { font-size: 18px; color: #ccc; }
.student-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
.student-card {
  background: white; border-radius: 10px; padding: 14px 18px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-decoration: none; color: inherit;
  display: flex; align-items: center; justify-content: space-between;
  transition: transform 0.2s, box-shadow 0.2s; cursor: pointer;
}
.student-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.1); }
.student-left { display: flex; align-items: center; gap: 12px; }
.student-rank {
  width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: white; flex-shrink: 0;
}
.student-rank.top3 { background: linear-gradient(135deg, #f1c40f, #e67e22); }
.student-rank.top10 { background: linear-gradient(135deg, #3498db, #2980b9); }
.student-rank.other { background: #bdc3c7; }
.student-name { font-size: 15px; font-weight: 600; color: #2c3e50; }
.student-right { display: flex; align-items: center; gap: 10px; }
.student-score { font-size: 18px; font-weight: 700; }
.student-score.high { color: #27ae60; }
.student-score.mid { color: #e67e22; }
.student-score.low { color: #e74c3c; }
.student-arrow { font-size: 16px; color: #ccc; transition: transform 0.2s; }
.student-card:hover .student-arrow { transform: translateX(3px); color: #999; }
.score-bar-wrap { width: 70px; height: 5px; background: #ecf0f1; border-radius: 3px; overflow: hidden; }
.score-bar { height: 100%; border-radius: 3px; }
.score-bar.high { background: linear-gradient(90deg, #2ecc71, #27ae60); }
.score-bar.mid { background: linear-gradient(90deg, #f39c12, #e67e22); }
.score-bar.low { background: linear-gradient(90deg, #e74c3c, #c0392b); }
.footer { text-align: center; padding: 24px 16px; color: #bdc3c7; font-size: 13px; line-height: 1.8; }
.footer .line { width: 32px; height: 2px; background: #ddd; border-radius: 1px; margin: 0 auto 12px; }
@media (min-width: 480px) { .student-grid { grid-template-columns: 1fr 1fr; } }
@media (min-width: 700px) { .student-grid { grid-template-columns: 1fr 1fr 1fr; } }
</style>
