<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>课堂报告中心</title><style>*{margin:0;padding:0;box-sizing:border-box}html{font-size:16px}body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;color:#2c3e50;line-height:1.6;-webkit-font-smoothing:antialiased}.top-bar{height:4px;background:linear-gradient(90deg,#3498db,#9b59b6,#e67e22,#2ecc71)}.container{max-width:800px;margin:0 auto;padding:24px 16px 40px}.hero{text-align:center;padding:36px 20px 28px;margin-bottom:20px}.hero-icon{font-size:52px;margin-bottom:14px;display:block}.hero h1{font-size:26px;font-weight:700;color:#2c3e50;margin-bottom:6px}.hero .subtitle{font-size:15px;color:#7f8c8d}.hero .divider{width:48px;height:3px;background:linear-gradient(90deg,#3498db,#9b59b6);border-radius:2px;margin:14px auto 0}.main-cards{display:grid;grid-template-columns:1fr;gap:20px}.card{background:#fff;border-radius:16px;padding:28px 24px;box-shadow:0 2px 12px rgba(0,0,0,.06);text-decoration:none;color:inherit;display:block;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;cursor:pointer}.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.1)}.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}.card.classroom::before{background:linear-gradient(90deg,#3498db,#2ecc71)}.card.weakness::before{background:linear-gradient(90deg,#667eea,#764ba2)}.card.exam::before{background:linear-gradient(90deg,#e74c3c,#9b59b6)}.card-header{display:flex;align-items:center;gap:14px;margin-bottom:12px}.card-icon{font-size:40px;flex-shrink:0}.card-title{font-size:22px;font-weight:700}.card-subtitle{font-size:13px;color:#95a5a6;margin-top:2px}.card-desc{font-size:14px;color:#7f8c8d;line-height:1.7}.card-stats{display:flex;gap:16px;margin-top:14px;padding-top:14px;border-top:1
