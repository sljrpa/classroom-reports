<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>课堂表现报告中心</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
  min-height: 100vh;
  color: #2c3e50;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* 顶部装饰条 */
.top-bar {
  height: 4px;
  background: linear-gradient(90deg, #3498db, #9b59b6, #e67e22, #2ecc71);
}

/* 主容器 */
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 24px 16px 40px;
}

/* 头部区域 */
.hero {
  text-align: center;
  padding: 40px 20px 32px;
  margin-bottom: 28px;
}
.hero-icon {
  font-size: 56px;
  margin-bottom: 16px;
  display: block;
}
.hero h1 {
  font-size: 26px;
  font-weight: 700;
  color: #2c3e50;
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.hero .subtitle {
  font-size: 15px;
  color: #7f8c8d;
  font-weight: 400;
}
.hero .divider {
  width: 48px;
  height: 3px;
  background: linear-gradient(90deg, #3498db, #9b59b6);
  border-radius: 2px;
  margin: 16px auto 0;
}

/* 班级卡片 */
.class-cards {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  margin-bottom: 32px;
}

.class-card {
  background: white;
  border-radius: 16px;
  padding: 28px 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  text-decoration: none;
  color: inherit;
  display: block;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}
.class-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
}
.class-card:active {
  transform: translateY(0);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* 卡片装饰条 */
.class-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
}
.class-card.class1::before {
  background: linear-gradient(90deg, #3498db, #2ecc71);
}
.class-card.class3::before {
  background: linear-gradient(90deg, #e67e22, #9b59b6);
}
.class-card.exam::before {
  background: linear-gradient(90deg, #e74c3c, #9b59b6);
}
  background: linear-gradient(90deg, #e67e22, #9b59b6);
}

.class-card .card-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}
.class-card .card-icon {
  font-size: 40px;
  flex-shrink: 0;
}
.class-card .card-title {
  font-size: 22px;
  font-weight: 700;
  color: #2c3e50;
}
.class-card .card-subtitle {
  font-size: 13px;
  color: #95a5a6;
  margin-top: 2px;
}
.class-card .card-desc {
  font-size: 14px;
  color: #7f8c8d;
  line-height: 1.7;
}
.class-card .card-stats {
  display: flex;
  gap: 16px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid #f0f0f0;
}
.class-card .stat {
  text-align: center;
  flex: 1;
}
.class-card .stat-num {
  font-size: 22px;
  font-weight: 700;
}
.class-card.class1 .stat-num { color: #3498db; }
.class-card.class3 .stat-num { color: #e67e22; }
.class-card .stat-label {
  font-size: 12px;
  color: #bdc3c7;
  margin-top: 2px;
}

/* 箭头 */
.class-card .arrow {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
  color: #ccc;
  transition: transform 0.2s, color 0.2s;
}
.class-card:hover .arrow {
  transform: translateY(-50%) translateX(3px);
  color: #999;
}

/* 底部说明 */
.footer {
  text-align: center;
  padding: 24px 16px;
  color: #bdc3c7;
  font-size: 13px;
  line-height: 1.8;
}
.footer .line {
  width: 32px;
  height: 2px;
  background: #ddd;
  border-radius: 1px;
  margin: 0 auto 12px;
}

/* 平板适配 */
@media (min-width: 600px) {
  .class-cards {
    grid-template-columns: 1fr 1fr;
  }
  .hero h1 { font-size: 30px; }
  .container { padding: 32px 24px 48px; }
}

/* 桌面适配 */
@media (min-width: 960px) {
  .hero h1 { font-size: 34px; }
  .hero-icon { font-size: 64px; }
}
</style>
</head>
<body>

<div class="top-bar"></div>

<div class="container">
  <!-- 头部 -->
  <div class="hero">
    <span class="hero-icon">📊</span>
    <h1>课堂表现报告中心</h1>
    <p class="subtitle">高三一班 &amp; 高三三班</p>
    <div class="divider"></div>
  </div>

  <!-- 班级卡片 -->
  <div class="class-cards">
    <a class="class-card class1" href="class1.html">
      <div class="card-header">
        <span class="card-icon">📘</span>
        <div>
          <div class="card-title">高三一班</div>
          <div class="card-subtitle">三周课堂表现追踪</div>
        </div>
      </div>
      <div class="card-desc">9个学习小组，三周持续追踪，关注每位同学的课堂参与与成长变化。</div>
      <div class="card-stats">
        <div class="stat">
          <div class="stat-num">9</div>
          <div class="stat-label">学习小组</div>
        </div>
        <div class="stat">
          <div class="stat-num">3</div>
          <div class="stat-label">追踪周数</div>
        </div>
      </div>
      <span class="arrow">›</span>
    </a>

    <a class="class-card class3" href="class3.html">
      <div class="card-header">
        <span class="card-icon">📙</span>
        <div>
          <div class="card-title">高三三班</div>
          <div class="card-subtitle">两周课堂表现追踪</div>
        </div>
      </div>
      <div class="card-desc">8个学习小组，两周数据对比，记录课堂参与度与进步轨迹。</div>
      <div class="card-stats">
        <div class="stat">
          <div class="stat-num">8</div>
          <div class="stat-label">学习小组</div>
        </div>
        <div class="stat">
          <div class="stat-num">2</div>
          <div class="stat-label">追踪周数</div>
        </div>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>

  <!-- 底部说明 -->
  <!-- 月考分析卡片 -->
    <a class="class-card exam" href="exam3.html" style="display:block;">
      <div class="card-header">
        <span class="card-icon">📝</span>
        <div>
          <div class="card-title">月考分析报告</div>
          <div class="card-subtitle">高三三班 · 6月月考</div>
        </div>
      </div>
      <div class="card-desc">逐题估分分析，25位同学每人一份详细报告，覆盖知识点掌握与提分建议。</div>
      <div class="card-stats">
        <div class="stat">
          <div class="stat-num" style="color:#e74c3c;">25</div>
          <div class="stat-label">学生报告</div>
        </div>
        <div class="stat">
          <div class="stat-num" style="color:#e74c3c;">26</div>
          <div class="stat-label">评分点</div>
        </div>
      </div>
      <span class="arrow">›</span>
    </a>

  <div class="footer">
    <div class="line"></div>
    <p>本站为只读展示页面，数据仅供家长参考</p>
    <p>如有疑问请与班主任联系</p>
  </div>
</div>

</body>
</html>
